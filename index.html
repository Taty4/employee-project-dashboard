<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EP Dashboard</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main>
      <div class="left-sidebar">
        <button class="btn-hide-nav">
          <svg
            class="svg-home"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 460.298 460.297"
          >
            <path
              d="M230.149 120.939 65.986 256.274c0 .191-.048.472-.144.855-.094.38-.144.656-.144.852v137.041c0 4.948 1.809 9.236 5.426 12.847 3.616 3.613 7.898 5.431 12.847 5.431h109.63V303.664h73.097v109.64h109.629c4.948 0 9.236-1.814 12.847-5.435 3.617-3.607 5.432-7.898 5.432-12.847V257.981c0-.76-.104-1.334-.288-1.707L230.149 120.939z"
            />
            <path
              d="M457.122 225.438 394.6 173.476V56.989c0-2.663-.856-4.853-2.574-6.567-1.704-1.712-3.894-2.568-6.563-2.568h-54.816c-2.666 0-4.855.856-6.57 2.568-1.711 1.714-2.566 3.905-2.566 6.567v55.673l-69.662-58.245c-6.084-4.949-13.318-7.423-21.694-7.423-8.375 0-15.608 2.474-21.698 7.423L3.172 225.438c-1.903 1.52-2.946 3.566-3.14 6.136-.193 2.568.472 4.811 1.997 6.713l17.701 21.128c1.525 1.712 3.521 2.759 5.996 3.142 2.285.192 4.57-.476 6.855-1.998L230.149 95.817l197.57 164.741c1.526 1.328 3.521 1.991 5.996 1.991h.858c2.471-.376 4.463-1.43 5.996-3.138l17.703-21.125c1.522-1.906 2.189-4.145 1.991-6.716-.194-2.563-1.241-4.609-3.14-6.132z"
            />
          </svg>
          Dashboard
          <svg
            class="svg-side-bar"
            width="22"
            height="22"
            viewBox="0 0 5.82 5.82"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M2.91 1.06L.79 2.91l2.12 2.12"
              fill="none"
              stroke-width="1"
              stroke-linejoin="round"
            />
            <path
              d="M5.29 1.06L3.18 2.91l2.12 2.12"
              fill="none"
              stroke-width="1"
              stroke-linejoin="round"
              opacity=".52"
            />
          </svg>
        </button>
        <p class="txt-period">Period</p>
        <div class="container-period">
          <select name="month-select" class="month-select">
            <option value="0">January</option>
            <option value="1">February</option>
            <option value="2">March</option>
            <option value="3">April</option>
            <option value="4">May</option>
            <option value="5">June</option>
            <option value="6">July</option>
            <option value="7">August</option>
            <option value="8">September</option>
            <option value="9">October</option>
            <option value="10">November</option>
            <option value="11">December</option>
          </select>
          <select name="year-select" class="year-select">
            <option value="2025">2025</option>
            <option value="2026">2026</option>
            <option value="2027">2027</option>
          </select>
          <button class="btn-seed-data">Seed Data</button>
        </div>
        <nav class="nav">
          <a href="#" id="nav-project" class="nav-item active">Projects</a>
          <a href="#" id="nav-employees" class="nav-item">Employees</a>
        </nav>
      </div>
      <div class="main-container"></div>
      <div class="right-sidebar"></div>
    </main>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
